name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, beast-unit]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean stale build cache
        working-directory: site
        run: rm -rf .astro dist node_modules/.astro

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: [self-hosted, beast-unit]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: [self-hosted, beast-unit]
    if: ${{ success() && vars.DISCORD_NOTIFY != 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          # Skip silently if webhook secret is not set
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi

          # Extract the subject line (first line of commit message)
          SUBJECT=$(echo "$COMMIT_MESSAGE" | head -n1)

          # Try to parse a conventional commit subject into a human-readable description.
          if echo "$SUBJECT" | grep -qE '^[a-z]+(\([^)]+\))?: .+'; then
            DESCRIPTION=$(echo "$SUBJECT" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //')
          else
            DESCRIPTION="$SUBJECT"
          fi

          # Work out what the deployment *was about* so the notification links
          # the reader directly to the most relevant page instead of the home
          # page. Check, in order of specificity:
          #
          #   1. A new entry added under entries/*.md → /entry/{slug}/
          #   2. A new or modified report under reports/{report}/*.md → /reports/{report}/
          #   3. A new or modified team profile under site/src/content/agents/*.md → /team/{slug}/
          #   4. Fallback to the journal home page.
          #
          # "New" takes priority over "modified" so a VTT-only bot commit still
          # resolves to the original entry or report it refreshed.
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          TARGET_URL="https://journal.nomercy.tv"
          TARGET_KIND="update"
          TARGET_TITLE=""

          # 1. New entry?
          NEW_ENTRY=$(echo "$CHANGED_FILES" | grep -E '^entries/.+\.md$' | tail -1)
          if [ -n "$NEW_ENTRY" ] && [ -f "$NEW_ENTRY" ]; then
            SLUG=$(grep -m1 '^slug:' "$NEW_ENTRY" | sed 's/^slug:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')
            if [ -n "$SLUG" ]; then
              TARGET_URL="https://journal.nomercy.tv/entry/${SLUG}/"
              TARGET_KIND="entry"
              TARGET_TITLE=$(grep -m1 '^title:' "$NEW_ENTRY" | sed 's/^title:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')
            fi
          fi

          # 2. Report — checked broadly because report deploys often include
          #    only component / CSS / player changes, not the markdown itself.
          #
          #    a) Markdown under reports/{slug}/*.md             → /reports/{slug}/
          #    b) Astro route site/src/pages/reports/{slug}.astro → /reports/{slug}/
          #    c) Report player / audio-sync components           → single report
          #       in reports/ if there is exactly one
          #    d) Bot commit "update audio VTTs" while public/audio/reports/
          #       changed → that report
          if [ "$TARGET_KIND" = "update" ]; then
            REPORT_SLUG=""

            # (a) markdown under reports/
            REPORT_FILE=$(echo "$CHANGED_FILES" | grep -E '^reports/[^/]+/.+\.md$' | tail -1)
            if [ -n "$REPORT_FILE" ]; then
              REPORT_SLUG=$(echo "$REPORT_FILE" | sed -E 's|^reports/([^/]+)/.*$|\1|')
            fi

            # (b) route under site/src/pages/reports/
            if [ -z "$REPORT_SLUG" ]; then
              REPORT_ROUTE=$(echo "$CHANGED_FILES" | grep -E '^site/src/pages/reports/[^/]+\.astro$' | tail -1)
              if [ -n "$REPORT_ROUTE" ]; then
                REPORT_SLUG=$(basename "$REPORT_ROUTE" .astro)
              fi
            fi

            # (c) report-scoped component change (ReportAudioPlayer, AudioSync)
            if [ -z "$REPORT_SLUG" ]; then
              if echo "$CHANGED_FILES" | grep -qE '^site/src/components/(ReportAudioPlayer|AudioSync)\.astro$'; then
                # Use the single report in reports/ if there is exactly one.
                CNT=$(ls -1 reports/ 2>/dev/null | wc -l | tr -d ' ')
                if [ "$CNT" = "1" ]; then
                  REPORT_SLUG=$(ls -1 reports/ | head -1)
                fi
              fi
            fi

            # (d) VTT bot commit touching public/audio/reports/
            if [ -z "$REPORT_SLUG" ]; then
              REPORT_VTT=$(echo "$CHANGED_FILES" | grep -E '^site/public/audio/reports/[^/]+/' | tail -1)
              if [ -n "$REPORT_VTT" ]; then
                REPORT_SLUG=$(echo "$REPORT_VTT" | sed -E 's|^site/public/audio/reports/([^/]+)/.*$|\1|')
              fi
            fi

            if [ -n "$REPORT_SLUG" ]; then
              TARGET_URL="https://journal.nomercy.tv/reports/${REPORT_SLUG}/"
              TARGET_KIND="report"
              TARGET_TITLE="$(echo "$REPORT_SLUG" | sed 's/-/ /g')"
            fi
          fi

          # 3. Team profile
          if [ "$TARGET_KIND" = "update" ]; then
            TEAM_FILE=$(echo "$CHANGED_FILES" | grep -E '^site/src/content/agents/.+\.md$' | tail -1)
            if [ -n "$TEAM_FILE" ] && [ -f "$TEAM_FILE" ]; then
              TEAM_SLUG=$(basename "$TEAM_FILE" .md)
              TARGET_URL="https://journal.nomercy.tv/team/${TEAM_SLUG}/"
              TARGET_KIND="team"
              TARGET_TITLE=$(grep -m1 '^display_name:' "$TEAM_FILE" | sed 's/^display_name:[[:space:]]*//; s/^["'\'']//; s/["'\'']$//')
            fi
          fi

          # 4. Fallback — any site change while the site actively iterates on
          #    a single report should point at that report. Beats the home page,
          #    which is just a rehash of the entries list and rarely what any
          #    specific commit is actually about.
          if [ "$TARGET_KIND" = "update" ]; then
            CNT=$(ls -1 reports/ 2>/dev/null | wc -l | tr -d ' ')
            if [ "$CNT" = "1" ]; then
              REPORT_SLUG=$(ls -1 reports/ | head -1)
              TARGET_URL="https://journal.nomercy.tv/reports/${REPORT_SLUG}/"
              TARGET_KIND="report"
              TARGET_TITLE="$(echo "$REPORT_SLUG" | sed 's/-/ /g')"
            fi
          fi

          case "$TARGET_KIND" in
            entry)   EMBED_DESCRIPTION="A new entry has been published to the NoMercy dev journal." ;;
            report)  EMBED_DESCRIPTION="A report has been updated on the NoMercy dev journal." ;;
            team)    EMBED_DESCRIPTION="A team profile has been updated on the NoMercy dev journal." ;;
            *)       EMBED_DESCRIPTION="The NoMercy dev journal has been updated." ;;
          esac

          # Format the ISO timestamp into something readable.
          FORMATTED_TIME=$(date -u -d "$COMMIT_TIMESTAMP" '+%d %b %Y at %H:%M UTC' 2>/dev/null || echo "$COMMIT_TIMESTAMP")

          # NoMercy brand color (#6C5CE7 = decimal 7,134,951)
          EMBED_COLOR=7134951

          PAYLOAD=$(cat <<EOF
          {
            "username": "Shipping in the Dark",
            "avatar_url": "https://journal.nomercy.tv/favicon.ico",
            "embeds": [
              {
                "title": "$DESCRIPTION",
                "url": "$TARGET_URL",
                "description": "$EMBED_DESCRIPTION",
                "color": $EMBED_COLOR,
                "fields": [
                  {
                    "name": "Author",
                    "value": "$COMMIT_AUTHOR",
                    "inline": true
                  },
                  {
                    "name": "Published",
                    "value": "$FORMATTED_TIME",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Shipping in the Dark — journal.nomercy.tv"
                },
                "timestamp": "$COMMIT_TIMESTAMP"
              }
            ]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Discord notification sent (HTTP $HTTP_STATUS)"
          else
            echo "Discord webhook returned HTTP $HTTP_STATUS — non-fatal, continuing"
            # Do not exit 1 — a failed notification must never break the deploy record
          fi
