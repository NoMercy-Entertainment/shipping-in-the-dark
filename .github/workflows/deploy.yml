name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ success() && vars.DISCORD_NOTIFY != 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          # Skip silently if webhook secret is not set
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi

          # Extract the subject line (first line of commit message)
          SUBJECT=$(echo "$COMMIT_MESSAGE" | head -n1)

          # Try to parse a conventional commit subject into a human-readable description.
          if echo "$SUBJECT" | grep -qE '^[a-z]+(\([^)]+\))?: .+'; then
            DESCRIPTION=$(echo "$SUBJECT" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //')
          else
            DESCRIPTION="$SUBJECT"
          fi

          # Find the newest entry added in this commit and extract its slug for a direct link.
          # Look for added/modified .md files in entries/ and parse the slug from frontmatter.
          ENTRY_SLUG=""
          NEWEST_ENTRY=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'entries/*.md' 2>/dev/null | tail -1)
          if [ -n "$NEWEST_ENTRY" ] && [ -f "$NEWEST_ENTRY" ]; then
            ENTRY_SLUG=$(grep -m1 '^slug:' "$NEWEST_ENTRY" | sed 's/^slug:[[:space:]]*//')
          fi

          # Build the URL — direct link to entry if we found a slug, otherwise homepage
          if [ -n "$ENTRY_SLUG" ]; then
            ENTRY_URL="https://journal.nomercy.tv/entry/${ENTRY_SLUG}"
          else
            ENTRY_URL="https://journal.nomercy.tv"
          fi

          # Format the ISO timestamp into something readable.
          FORMATTED_TIME=$(date -u -d "$COMMIT_TIMESTAMP" '+%d %b %Y at %H:%M UTC' 2>/dev/null || echo "$COMMIT_TIMESTAMP")

          # NoMercy brand color (#6C5CE7 = decimal 7,134,951)
          EMBED_COLOR=7134951

          PAYLOAD=$(cat <<EOF
          {
            "username": "Shipping in the Dark",
            "avatar_url": "https://journal.nomercy.tv/favicon.ico",
            "embeds": [
              {
                "title": "$DESCRIPTION",
                "url": "$ENTRY_URL",
                "description": "A new entry has been published to the NoMercy dev journal.",
                "color": $EMBED_COLOR,
                "fields": [
                  {
                    "name": "Author",
                    "value": "$COMMIT_AUTHOR",
                    "inline": true
                  },
                  {
                    "name": "Published",
                    "value": "$FORMATTED_TIME",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Shipping in the Dark — journal.nomercy.tv"
                },
                "timestamp": "$COMMIT_TIMESTAMP"
              }
            ]
          }
          EOF
          )

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Discord notification sent (HTTP $HTTP_STATUS)"
          else
            echo "Discord webhook returned HTTP $HTTP_STATUS — non-fatal, continuing"
            # Do not exit 1 — a failed notification must never break the deploy record
          fi
